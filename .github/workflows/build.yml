name: build

# Builds the container image and boots it to prove the runtime resolves —
# most importantly that Postgres initialises and answers a live query under
# the same hardening the real launcher uses (--cap-drop=ALL). Kept off the
# per-PR path; runs on pushes to main and on demand.
#
# Scope: Postgres only. The full dev-tool matrix (Rust/JDK/Go/Node/...) is
# validated by the build itself elsewhere; here we keep the image small so the
# job stays fast.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build image (Postgres)
        run: |
          podman build --build-arg INSTALL_POSTGRES=true \
            -t localhost/codex-sandbox:ci -f Containerfile .

      - name: Verify Postgres boots + answers a live query
        run: |
          # The image runs as USER codex (uid 1000) and owns /home/codex. On a
          # rootless runner (uid 1001) the userns maps that home to a uid the
          # runtime process is NOT, so a --cap-drop=ALL process (no DAC_OVERRIDE)
          # can't write its own home -> initdb/config fail. Mount a fresh,
          # world-writable tmpfs over the home so the entrypoint can init the DB
          # regardless of the runner's uid. Everything else mirrors the real
          # launcher (cap-drop + no-new-privileges).
          podman run --rm \
            --tmpfs /home/codex:rw,mode=1777 \
            --cap-drop=ALL --security-opt=no-new-privileges \
            localhost/codex-sandbox:ci /bin/bash -c '
              set -e
              # Postgres is NOT bwrap-wrapped: the shared entrypoint already ran
              # initdb + start + createdb before this command, so query it live.
              psql -h /tmp -d codex -tAc "select 1" | grep -qx 1
              echo "postgres: OK (live query)"
              for b in psql initdb pg_ctl; do
                command -v "$b" >/dev/null && echo "present: $b" || { echo "MISSING: $b"; exit 1; }
              done
            '

name: build

# Heavy: builds the image with EVERY dev environment enabled and boots it to
# prove they all resolve (incl. a real Postgres query). Kept off the per-PR
# path — runs on pushes to main and on demand.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      # A full image (Rust + JDK + Gradle + Go + Node + Postgres + build tools)
      # is several GB; reclaim space the runner preinstalls but we don't need.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo apt-get clean || true
          df -h /

      - name: Build image with ALL dev environments
        run: |
          podman build --no-cache \
            --build-arg INSTALL_CARGO=true \
            --build-arg INSTALL_PIP=true \
            --build-arg INSTALL_NODE=true \
            --build-arg INSTALL_PNPM=true \
            --build-arg INSTALL_JDK=true \
            --build-arg INSTALL_GRADLE=true \
            --build-arg INSTALL_GO=true \
            --build-arg INSTALL_POSTGRES=true \
            -t localhost/codex-sandbox:ci -f Containerfile .

      - name: Verify everything resolves (Postgres boots + toolchains present)
        run: |
          podman run --rm --cap-drop=ALL --security-opt=no-new-privileges \
            localhost/codex-sandbox:ci /bin/bash -c '
              set -e
              # Postgres is NOT bwrap-wrapped: the shared entrypoint already ran
              # initdb + start + createdb before this command, so query it live.
              psql -h /tmp -d codex -tAc "select 1" | grep -qx 1
              echo "postgres: OK (live query)"
              # Every dev toolchain must be installed and on PATH.
              for b in cargo pip3 node pnpm java gradle go python3 psql initdb; do
                command -v "$b" >/dev/null && echo "present: $b" || { echo "MISSING: $b"; exit 1; }
              done
              # Best-effort execution — tools are bwrap-wrapped, which may not
              # run in a nested CI container; informational, never fatal.
              echo "-- version run (best-effort) --"
              for c in "python3 --version" "node --version" "cargo --version" "go version" "pnpm --version"; do
                out="$($c 2>&1 | head -1)" && echo "  $c -> $out" || echo "  $c -> skipped (bwrap unavailable in CI)"
              done
            '
